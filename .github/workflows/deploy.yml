name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages via gh-pages branch (debug)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  deploy:
    if: false
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Pages artifact (debug)
        uses: actions/download-pages-artifact@v1
        with:
          path: pages_artifact

      - name: Show Pages artifact contents (debug)
        run: |
          echo "Listing pages_artifact root"
          ls -la pages_artifact || true
          echo "Listing recursive contents"
          find pages_artifact -maxdepth 5 -type f -printf "%p %k KB\n" || true
          echo "Show first lines of index.html (if present)"
          if [ -f pages_artifact/index.html ]; then head -n 30 pages_artifact/index.html || true; else echo "index.html not found"; fi

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
